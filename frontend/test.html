<!DOCTYPE html>
<html>
<head>
  <title>Canva Demo</title>
</head>
<body>

<h1>Canva Integration Demo</h1>

<button onclick="connect()">Design with Canva</button>

<br><br>

<button onclick="openCanva()">Open Canva Editor</button>

<br><br>

<!-- ✅ USER PASTES FULL URL -->
<input 
  type="text" 
  id="designUrlInput" 
  placeholder="Paste Canva Design URL here"
  style="padding:10px; width:400px;"
/>

<br><br>

<button onclick="downloadDesign()">Download Design</button>

<br><br>

<pre id="result"></pre>

<script>
function connect() {
  window.location.href = "https://canva-shopify-backend.onrender.com/connect";
}

function openCanva() {
  window.open("https://www.canva.com/", "_blank");
}

// ✅ AUTO EXTRACT DESIGN ID
function extractDesignId(url) {
  const match = url.match(/design\/([A-Za-z0-9_-]+)/);
  return match ? match[1] : null;
}

async function downloadDesign() {
  const url = document.getElementById("designUrlInput").value;

  const designId = url.match(/design\/([A-Za-z0-9_-]+)/)?.[1];

  if (!designId) {
    alert("Invalid Canva URL");
    return;
  }

  try {
    const res = await fetch(
      `https://canva-shopify-backend.onrender.com/export?designId=${designId}`
    );

    const text = await res.text(); // ✅ FIXED

    try {
      const data = JSON.parse(text);

      if (data.downloadUrl) {
        window.location.href = data.downloadUrl;
      } else {
        alert("Export failed");
      }
    } catch {
      alert(text); // shows "Export failed"
    }

  } catch (err) {
    console.error(err);
    alert("Something went wrong");
  }
}
</script>

</body>
</html>
